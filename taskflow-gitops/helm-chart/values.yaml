# ── Image ──────────────────────────────────────────────────────────────────────
# GitHub Actions updates `image.tag` on every push to main.
image:
  repository: your-dockerhub-username/taskflow-ui
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# ── Replicas ────────────────────────────────────────────────────────────────────
replicaCount: 2

# ── Service ─────────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80

# ── Ingress ─────────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  host: taskflow.local
  path: /
  pathType: Prefix
  tls: []
  # tls:
  #   - secretName: taskflow-tls
  #     hosts:
  #       - taskflow.local

# ── Resources ───────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

# ── Health probes ────────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /health
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3
  timeoutSeconds: 3

readinessProbe:
  httpGet:
    path: /health
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 3

# ── Horizontal Pod Autoscaler ────────────────────────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# ── Miscellaneous ────────────────────────────────────────────────────────────────
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

nameOverride: ""
fullnameOverride: ""
