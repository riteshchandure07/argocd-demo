apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-ui
  namespace: taskflow
  labels:
    app: taskflow-ui
    app.kubernetes.io/name: taskflow-ui
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskflow-ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # zero-downtime: always keep at least `replicas` pods up
  template:
    metadata:
      labels:
        app: taskflow-ui
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: taskflow-ui
          image: your-dockerhub-username/taskflow-ui:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
